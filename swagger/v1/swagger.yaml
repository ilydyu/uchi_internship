---
openapi: 3.0.3
info:
  title: API сервиса для тестового задания
  version: 0.1.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Ожидается токен, выдаваемый при регистрации студента
      bearerFormat: SHA256
  parameters:
    school_id:
      name: school_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
    class_id:
      name: class_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  schemas:
    Class:
      type: object
      required:
      - id
      - number
      - letter
      - students_count
      properties:
        id:
          type: integer
          format: int32
          readOnly: true
          example: 10
        number:
          type: integer
          format: int32
          example: 1
          description: Цифра класса
        letter:
          type: string
          example: Б
          description: Буква класса
        students_count:
          type: integer
          format: int32
          readOnly: true
          example: 32
          description: Количество учеников в классе
    Student:
      type: object
      required:
      - id
      - first_name
      - last_name
      - surname
      - class_id
      - school_id
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 10
        first_name:
          type: string
          example: Вячеслав
        last_name:
          type: string
          example: Абдурахмангаджиевич
        surname:
          type: string
          example: Мухобойников-Сыркин
        class_id:
          type: integer
          format: int32
        school_id:
          type: integer
          format: int32
paths:
  "/schools/{school_id}/classes":
    parameters:
    - name: school_id
      in: path
      format: int32
      required: true
      schema:
        type: integer
    get:
      summary: Вывести список классов школы
      tags:
      - classes
      operationId: getClassList
      responses:
        '200':
          description: Список классов
  "/schools/{school_id}/classes/{class_id}/students":
    parameters:
    - name: school_id
      in: path
      format: int32
      required: true
      schema:
        type: integer
    - name: class_id
      in: path
      format: int32
      description: id класса
      required: true
      schema:
        type: integer
    get:
      summary: Вывести список студентов класса
      tags:
      - students
      - classes
      operationId: getClassStudentList
      responses:
        '200':
          description: Список студентов
  "/students":
    post:
      summary: Регистрация нового студента
      tags:
      - students
      operationId: createStudent
      parameters: []
      responses:
        '201':
          description: Successful operation
          headers:
            X-Auth-Token:
              schema:
                type: string
              description: Токен для последующей авторизации
        '405':
          description: Invalid input
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                surname:
                  type: string
                class_id:
                  type: integer
                school_id:
                  type: integer
              required:
              - first_name
              - last_name
              - surname
              - class_id
              - school_id
  "/students/{user_id}":
    parameters:
    - name: user_id
      in: path
      format: int64
      description: id студента
      required: true
      schema:
        type: integer
    delete:
      summary: Удалить студента
      tags:
      - students
      operationId: deleteStudent
      security:
      - bearerAuth: []
      responses:
        '400':
          description: Некорректный id студента
        '401':
          description: Некорректная авторизация
        '204':
          description: Студент удалён
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
